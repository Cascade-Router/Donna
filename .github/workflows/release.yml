name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Ensure tts_models directory exists
        shell: bash
        run: mkdir -p tts_models

      - name: Build with PyInstaller
        run: pyinstaller donna_build.spec --noconfirm --clean

      - name: Package Windows executable
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path dist/Donna/Donna.exe) {
            Compress-Archive -Path dist/Donna/* -DestinationPath dist/Donna-windows-x64.zip -Force
          } else {
            Get-ChildItem -Recurse dist | Select-Object FullName
            throw "Expected dist/Donna/Donna.exe missing"
          }

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Donna ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            dist/Donna-windows-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
