name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Ensure tts_models directory exists
        shell: bash
        run: mkdir -p tts_models

      - name: Build with PyInstaller
        run: pyinstaller donna_build.spec --noconfirm --clean

      - name: Package Windows executable
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path dist/Donna/Donna.exe) {
            Compress-Archive -Path dist/Donna/* -DestinationPath dist/Donna-windows-x64.zip -Force
          } else {
            Get-ChildItem -Recurse dist | Select-Object FullName
            throw "Expected dist/Donna/Donna.exe missing"
          }

      - name: Package macOS app / DMG
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          if [[ -d dist/Donna.app ]]; then
            APP_SRC=dist/Donna.app
          elif [[ -d dist/Donna ]]; then
            mkdir -p dist/Donna.app/Contents/MacOS
            cp -R dist/Donna/. dist/Donna.app/Contents/MacOS/
            cat > dist/Donna.app/Contents/Info.plist <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key><string>Donna</string>
            <key>CFBundleIdentifier</key><string>com.donna.agent</string>
            <key>CFBundleName</key><string>Donna</string>
            <key>CFBundlePackageType</key><string>APPL</string>
          </dict>
          </plist>
          PLIST
            APP_SRC=dist/Donna.app
          else
            ls -laR dist || true
            echo "No macOS app bundle produced" >&2
            exit 1
          fi
          hdiutil create -volname Donna -srcfolder "$APP_SRC" -ov -format UDZO dist/Donna-macos-x64.dmg
          ditto -c -k --sequesterRsrc --keepParent "$APP_SRC" dist/Donna-macos-x64.app.zip

      - name: Package Linux AppImage
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          test -x dist/Donna/Donna || { ls -laR dist; exit 1; }
          rm -rf AppDir
          mkdir -p AppDir/usr/bin
          cp -a dist/Donna/. AppDir/usr/bin/
          cat > AppDir/donna.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=Donna
          Exec=Donna
          Icon=donna
          Categories=Utility;AudioVideo;
          Terminal=false
          EOF
          # Minimal placeholder icon (1x1 PNG) if none shipped.
          python - <<'PY'
          import struct, zlib, pathlib
          path = pathlib.Path("AppDir/donna.png")
          def chunk(tag, data):
              return struct.pack(">I", len(data)) + tag + data + struct.pack(">I", zlib.crc32(tag + data) & 0xffffffff)
          raw = b"\x00" + b"\x00\x00\x00"  # filter + RGBA pixel
          png = b"\x89PNG\r\n\x1a\n" + chunk(b"IHDR", struct.pack(">IIBBBBB", 1, 1, 8, 6, 0, 0, 0)) + chunk(b"IDAT", zlib.compress(raw)) + chunk(b"IEND", b"")
          path.write_bytes(png)
          PY
          cat > AppDir/AppRun <<'EOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/Donna" "$@"
          EOF
          chmod +x AppDir/AppRun AppDir/usr/bin/Donna
          curl -fsSL -o appimagetool \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          ./appimagetool AppDir dist/Donna-linux-x86_64.AppImage
          # Also ship the raw onedir tree for hosts that cannot run AppImages.
          tar -C dist -czf dist/Donna-linux-x86_64.tar.gz Donna

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Donna ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            dist/Donna-windows-x64.zip
            dist/Donna-macos-x64.dmg
            dist/Donna-macos-x64.app.zip
            dist/Donna-linux-x86_64.AppImage
            dist/Donna-linux-x86_64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
